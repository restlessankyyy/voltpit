name: TeslaDash
options:
  bundleIdPrefix: com.voltpit
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  TeslaDash:
    type: application
    platform: iOS
    sources:
      - path: TeslaDash
    settings:
      base:
        INFOPLIST_FILE: TeslaDash/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ankitraj.tesladash
        DEVELOPMENT_TEAM: SYB4Q5V288
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: "NO"

  TeslaDashTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TeslaDashTests
    dependencies:
      - target: TeslaDash
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ankitraj.tesladash.tests
        GENERATE_INFOPLIST_FILE: "YES"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"

schemes:
  TeslaDash:
    build:
      targets:
        TeslaDash: all
    test:
      targets:
        - TeslaDashTests
