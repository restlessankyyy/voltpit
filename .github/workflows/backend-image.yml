name: Backend Image

# Build the backend container and publish it to GitHub Container Registry (GHCR).
# Pushes happen on main and on version tags; pull requests build only (no push).

on:
  push:
    branches: [main]
    tags: ["v*"]
    # No paths filter here: GitHub applies push `paths` to tag pushes too, so a
    # release tag whose commit only touched infra/ would be skipped and never
    # publish its versioned image. Branch pushes are cheap to rebuild (the image
    # tag is content-addressed), so we always build on main and on every v* tag.
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-image.yml"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}-backend

jobs:
  image:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # The Dockerfile serves keys/public-key.pem at the Tesla well-known path.
      # Real keys are gitignored, so generate a throwaway public key just so the
      # image builds. Each real deployment ships its own key via the infra build.
      - name: Generate placeholder public key
        run: |
          mkdir -p backend/keys
          openssl ecparam -name prime256v1 -genkey -noout -out backend/keys/private-key.pem
          openssl ec -in backend/keys/private-key.pem -pubout -out backend/keys/public-key.pem

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
