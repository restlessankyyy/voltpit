name: Release

# Cut a versioned GitHub Release. Run manually from the Actions tab and pick a
# bump level; the workflow computes the next semver from the latest v* tag,
# creates and pushes the tag, then publishes a release with generated notes.
# Pushing the v* tag also triggers the Backend Image workflow to publish a
# matching container image.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (auto reads conventional commits)"
        type: choice
        default: auto
        options:
          - auto
          - patch
          - minor
          - major
      prerelease:
        description: "Mark the release as a prerelease"
        type: boolean
        default: false

permissions:
  contents: write
  models: read

jobs:
  release:
    name: Tag and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          latest="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi
          echo "Latest tag: $latest"
          version="${latest#v}"
          IFS='.' read -r major minor patch <<< "$version"
          major="${major:-0}"; minor="${minor:-0}"; patch="${patch:-0}"

          # Resolve the requested bump. "auto" inspects conventional commits
          # since the previous tag: feat! / BREAKING CHANGE -> major,
          # feat -> minor, everything else -> patch.
          bump="${{ inputs.bump }}"
          if [ "$bump" = "auto" ]; then
            if [ "$latest" = "v0.0.0" ] || ! git rev-parse "$latest" >/dev/null 2>&1; then
              range=""
            else
              range="${latest}..HEAD"
            fi
            log="$(git log --no-merges --pretty='%B' $range)"
            if printf '%s' "$log" | grep -qE '(^|\n)[[:space:]]*BREAKING CHANGE' \
               || printf '%s' "$log" | grep -qE '^[a-z]+(\([^)]*\))?!:'; then
              bump="major"
            elif printf '%s' "$log" | grep -qE '^feat(\([^)]*\))?:'; then
              bump="minor"
            else
              bump="patch"
            fi
            echo "Auto-detected bump: $bump"
          fi

          case "$bump" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          next="v${major}.${minor}.${patch}"
          echo "Next tag: $next"
          if git rev-parse "$next" >/dev/null 2>&1; then
            echo "Tag $next already exists" >&2
            exit 1
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "previous=$latest" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      # Collect the commit log and changed-file summary since the previous tag.
      # This is the context the model uses to write the release description.
      - name: Collect commit context
        id: context
        env:
          TAG: ${{ steps.version.outputs.tag }}
          PREVIOUS: ${{ steps.version.outputs.previous }}
        run: |
          set -euo pipefail
          if [ "$PREVIOUS" = "v0.0.0" ] || ! git rev-parse "$PREVIOUS" >/dev/null 2>&1; then
            range=""
          else
            range="${PREVIOUS}..HEAD"
          fi
          {
            echo "Release $TAG (previous: $PREVIOUS)"
            echo
            echo "## Commits"
            git log --no-merges --pretty='- %s (%h)' $range
            echo
            echo "## Changed files"
            git diff --stat ${range:-HEAD~1} HEAD 2>/dev/null || git show --stat --oneline HEAD
          } > commit-context.md
          echo "Collected $(wc -l < commit-context.md) lines of context"

      # An LLM writes a polished release description from the commit context.
      # Best-effort with layered fallback: try Gemini first (when GEMINI_API_KEY
      # is set), fall back to GitHub Models (built-in token) on any failure, and
      # if both fail fall back to GitHub's auto-generated notes in the next step.
      - name: Generate release notes
        id: ai
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.5-flash
          GH_MODELS_TOKEN: ${{ github.token }}
          GH_MODEL: openai/gpt-4.1-mini
        run: |
          set -uo pipefail
          system='You are a release-notes writer for the Voltpit project (a SwiftUI iPhone Tesla dashboard with a Node/TypeScript backend on Azure). Write concise, user-facing GitHub release notes in Markdown from the provided commit context. Start with a one-paragraph summary, then a "What'"'"'s changed" bullet list grouped by area (Backend, iOS, Infra, CI) when it helps. Omit empty groups. Do not invent changes. Do not use the em dash character.'

          # Try Gemini. Writes ai-notes.md and returns 0 on success.
          try_gemini() {
            [ -n "${GEMINI_API_KEY:-}" ] || { echo "Gemini skipped: no GEMINI_API_KEY"; return 1; }
            echo "Trying provider: gemini ($GEMINI_MODEL)"
            jq -n \
              --arg sys "$system" \
              --rawfile ctx commit-context.md \
              '{
                system_instruction: { parts: [ { text: $sys } ] },
                contents: [ { role: "user", parts: [ { text: $ctx } ] } ],
                generationConfig: { maxOutputTokens: 800, temperature: 0.3 }
              }' > ai-req.json
            http="$(curl -sS -o ai-resp.json -w '%{http_code}' \
              -H 'Content-Type: application/json' \
              -H "x-goog-api-key: ${GEMINI_API_KEY}" \
              -X POST \
              "https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent" \
              -d @ai-req.json)" || { echo "Gemini curl failed"; return 1; }
            echo "Gemini HTTP $http"
            if [ "$http" != "200" ]; then
              echo "Gemini request failed:"; cat ai-resp.json || true
              return 1
            fi
            jq -r '[.candidates[0].content.parts[].text] | join("") // empty' ai-resp.json > ai-notes.md
            [ -s ai-notes.md ] || { echo "Gemini returned empty notes"; return 1; }
            return 0
          }

          # Try GitHub Models. Writes ai-notes.md and returns 0 on success.
          try_github_models() {
            echo "Trying provider: github-models ($GH_MODEL)"
            jq -n \
              --arg model "$GH_MODEL" \
              --arg sys "$system" \
              --rawfile ctx commit-context.md \
              '{
                model: $model,
                temperature: 0.3,
                max_tokens: 800,
                messages: [
                  { role: "system", content: $sys },
                  { role: "user", content: $ctx }
                ]
              }' > ai-req.json
            http="$(curl -sS -o ai-resp.json -w '%{http_code}' \
              -H 'Content-Type: application/json' \
              -H "Authorization: Bearer ${GH_MODELS_TOKEN}" \
              -X POST \
              "https://models.github.ai/inference/chat/completions" \
              -d @ai-req.json)" || { echo "GitHub Models curl failed"; return 1; }
            echo "GitHub Models HTTP $http"
            if [ "$http" != "200" ]; then
              echo "GitHub Models request failed:"; cat ai-resp.json || true
              return 1
            fi
            jq -r '.choices[0].message.content // empty' ai-resp.json > ai-notes.md
            [ -s ai-notes.md ] || { echo "GitHub Models returned empty notes"; return 1; }
            return 0
          }

          if try_gemini || try_github_models; then
            echo "Generated $(wc -l < ai-notes.md) lines of notes"
            echo "notes-file=ai-notes.md" >> "$GITHUB_OUTPUT"
          else
            echo "All providers failed; will fall back to auto-generated notes"
            echo "notes-file=" >> "$GITHUB_OUTPUT"
          fi


      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          PREVIOUS: ${{ steps.version.outputs.previous }}
          PRERELEASE: ${{ inputs.prerelease }}
          AI_OUTCOME: ${{ steps.ai.outcome }}
          AI_NOTES_FILE: ${{ steps.ai.outputs.notes-file }}
        run: |
          set -euo pipefail
          args=(--title "$TAG" --target "$GITHUB_SHA")
          if [ "$AI_OUTCOME" = "success" ] && [ -n "$AI_NOTES_FILE" ] && [ -s "$AI_NOTES_FILE" ]; then
            echo "Using AI-generated release notes"
            args+=(--notes-file "$AI_NOTES_FILE")
          else
            echo "Falling back to auto-generated notes"
            args+=(--generate-notes)
            if [ "$PREVIOUS" != "v0.0.0" ]; then
              args+=(--notes-start-tag "$PREVIOUS")
            fi
          fi
          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          gh release create "$TAG" "${args[@]}"
